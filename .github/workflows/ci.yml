name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package Linux binary
        run: npm run package:binary -- --target node22-linux-x64

      - name: Smoke test packaged binary
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BINARY="artifacts/wechat-tui-v${VERSION}-linux-x64"
          PKG_NATIVE_CACHE_PATH="${PWD}/.tmp/pkg-native-cache" "${BINARY}" --version
